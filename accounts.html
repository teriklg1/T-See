<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ferienwohnung Accounts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Newsreader:opsz,wght@6..72,400;6..72,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-shape bg-shape-a"></div>
  <div class="bg-shape bg-shape-b"></div>

  <main class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">Ferienwohnung</p>
        <h1>Accountverwaltung</h1>
      </div>
      <div class="top-actions">
        <div class="account-chip" id="currentUserBadge" aria-live="polite"></div>
        <button id="logoutBtn" class="text-btn" type="button">Abmelden</button>
        <a class="ghost-btn link-btn" href="index.html">Zur Startseite</a>
      </div>
    </header>

    <section class="card accounts-card" aria-live="polite">
      <div class="news-header">
        <h3>Familien-Accounts</h3>
        <p>Nur für Admin-Accounts sichtbar</p>
      </div>

      <form id="accountForm" class="news-form">
        <label for="accountDisplayName">Name</label>
        <input id="accountDisplayName" type="text" maxlength="80" required placeholder="z. B. Lisa" />

        <label for="accountUsername">Benutzername</label>
        <input id="accountUsername" type="text" maxlength="50" required placeholder="z. B. lisa" />

        <label for="accountPassword">Passwort</label>
        <input id="accountPassword" type="text" maxlength="50" required placeholder="z. B. lisa123" />

        <label class="inline-check"><input id="accountIsAdmin" type="checkbox" /> Adminrechte vergeben</label>

        <button class="ghost-btn" type="submit">Account erstellen</button>
      </form>

      <ul id="accountsList" class="news-list"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>

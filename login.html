<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ferienwohnung Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Newsreader:opsz,wght@6..72,400;6..72,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-shape bg-shape-a"></div>
  <div class="bg-shape bg-shape-b"></div>

  <main class="app auth-app">
    <section class="card auth-card">
      <p class="eyebrow">Familienzugang</p>
      <h1>Anmeldung</h1>
      <p class="intro-text">Melde dich mit deinem Familien-Account an.</p>

      <form id="loginForm" class="news-form">
        <label for="loginUsername">Benutzername</label>
        <input id="loginUsername" type="text" required autocomplete="username" placeholder="z. B. anna" />

        <label for="loginPassword">Passwort</label>
        <input id="loginPassword" type="password" required autocomplete="current-password" placeholder="Passwort" />

        <button class="ghost-btn" type="submit">Einloggen</button>
      </form>

      <p id="loginError" class="auth-error hidden">Benutzername oder Passwort ist falsch.</p>
      <p class="auth-hint">Nur Accounts mit Redaktionsrecht können News erstellen und bearbeiten.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
